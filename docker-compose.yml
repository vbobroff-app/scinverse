services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: scinverse-timescaledb
    environment:
      POSTGRES_USER: scinverse
      POSTGRES_PASSWORD: scinverse
      POSTGRES_DB: scinverse
    ports:
      - "5432:5432"
    volumes:
      - scinverse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scinverse -d scinverse"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  scinverse_pgdata:
